<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Intitulé -->
    <h1>Compétences</h1>

    <!-- Thème 1 -->
    <section class="themes">
        <h2>Graphisme</h2>
        <div class="skills-container">
            <div class="progress" style="--i:85;--clr:#38bdf8;">
                <h3>85<span>%</span></h3>
                <h4>AI</h4>
            </div>
            <p>PS</p>
            <p>ID</p>
            <p>FIGMA</p>
            <p>PROCREATE</p>
        </div>
        <!-- Ajout d'un skill -->
         <form action="submit"> 
            <div>
                <label for="skill">Ajouter une compétence</label>
                <input type="text" name="skill" id="inputSkill" required>
            </div>
         </form>
    </section>

    <!-- Thème 2 -->
    <section class="themes">
        <h2>Langues</h2>
            <div class="skills">
                <p>Français</p>
                <p>Anglais</p>
                <p>Espagnol</p>
            </div>
        <!-- Ajout d'un skill -->
        <form action="submit"> 
            <div>
                <label for="skill">Ajouter une compétence</label>
                <input type="text" name="skill" id="inputSkill" required>
            </div>
         </form>
    </section>

    <!-- Ajout d'un thème -->
    <form action="submit"> 
            <div>
                <label for="skill">AJOUTER UN THÈME</label>
                <input type="text" name="theme" id="inputTheme" required>
            </div>
    </form>
   

</body>

</html>

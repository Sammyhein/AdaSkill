<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Intitulé -->
    <h1>Compétences</h1>

    <!-- Thème 1 -->
    <section class="themes">
        <h2>Graphisme</h2>
        <div class="skills-container">
            <div class="progress" style="--i:85;--clr:#38bdf8;">
                <h3>85<span>%</span></h3>
                <h4>AI</h4>
            </div>
            
            <div class="progress" style="--i:65;--clr:#38bdf8;">
                <h3>65<span>%</span></h3>
                <h4>PS</h4>
            </div>

            <div class="progress" style="--i:70;--clr:#38bdf8;">
                <h3>70<span>%</span></h3>
                <h4>ID</h4>
            </div>

            <div class="progress less" style="--i:25;--clr:#38bdf8;">
                <h3>25<span>%</span></h3>
                <h4>FIGMA</h4>
            </div>

            <div class="progress" style="--i:50;--clr:#38bdf8;">
                <h3>50<span>%</span></h3>
                <h4>PROCREATE</4>
            </div>
        </div>
        <!-- Ajout d'un skill -->
         <form action="submit" class="skillForm"> 
                <label for="skill">Ajouter une compétence</label>
                <input type="text" name="skill" id="inputSkill" required>
                <button>+</button>
         </form>
    </section>

    <!-- Thème 2 -->
    <section class="themes">
        <h2>Langues</h2>
            <div class="skills-container">
                <div class="progress" style="--i:100;--clr:#38bdf8;">
                    <h3><span>Français</span></h3>
                </div>

                <div class="progress" style="--i:90;--clr:#38bdf8;">
                    <h3><span>Anglais</span></h3>
                </div>
                
                <div class="progress" style="--i:50;--clr:#38bdf8;">
                    <h3><span>Espagnol</span></h3>
                </div>
            </div>
        <!-- Ajout d'un skill -->
        <form action="submit" class="skillForm"> 
            <label for="skill">Ajouter une compétence</label>
            <input type="text" name="skill" id="inputSkill" required>
            <button>+</button>
         </form>
    </section>

    <!-- Ajout d'un thème -->
    <form action="submit" class="themeForm"> 
            <label for="skill">Ajouter un Thème</label>
            <input type="text" name="theme" id="inputTheme" required>
            <button>+</button>
    </form>
   

</body>

</html>
